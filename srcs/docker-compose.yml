networks:
  inception-network:
    driver: bridge

# Définition des volumes nommés (stockage dans /home/login/data)
volumes:
  db_data:
    name: db_data
  wp_files:
    name: wp_files

# Services
services:
  # 1. MARIA DB - Base de données
  mariadb:
    container_name: mariadb
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    image: mariadb:custom
    restart: unless-stopped  # Redémarrage en cas de crash
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - inception-network
    expose:
      - "3306"  # Port interne uniquement, pas exposé sur l'hôte
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. WORDPRESS + PHP-FPM (sans nginx)
  wordpress:
    container_name: wordpress
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    image: wordpress:custom
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: mariadb:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - wp_files:/var/www/html
    networks:
      - inception-network
    expose:
      - "9000"  # Port PHP-FPM interne

  # 3. NGINX - Seul point d'entrée (port 443 uniquement)
  nginx:
    container_name: nginx
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    image: nginx:custom
    restart: unless-stopped
    depends_on:
      - wordpress
    ports:
      - "443:443"  # SEUL port exposé sur l'hôte
    volumes:
      - wp_files:/var/www/html:ro  # Monte les fichiers WP en lecture seule
    networks:
      - inception-network
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}

